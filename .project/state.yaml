known_issues:
  - id: I-001
    title: Legacy duplicate projects in .rorven/state.json
    description: >
      Many test runs created duplicate "Rorven Local" projects under the same
      workspace root. The uniqueness guard was added (raises ValueError on
      duplicate workspace_root), but the existing data has duplicates.
    remediation: Manual cleanup of .rorven/state.json or a migration pass.
  - id: I-002
    title: subagent dispatch has only the first approved agent types
    description: >
      Project orchestrators can now dispatch real reviewer and implementer child
      tasks through a structured JSON contract. Broader agent definitions,
      permission profiles, and versioned workflow definitions are still pending.
    remediation: Add versioned agent/workflow definition storage and expand the
      dispatch policy as each approved subagent type is implemented.
  - id: I-003
    title: local file persistence remains the temporary system of record
    description: >
      The API and worker persist projects, runs, tasks, artifacts, settings, and
      root messages to state.json. The product target remains Postgres.
    remediation: Implement the Postgres repository slice with startup migration
      tests before claiming production persistence.
  - id: I-004
    title: workspace tools are useful but not sandboxed
    description: >
      Child agents can request bounded multi-round policy-checked workspace
      inspection tools, text-file write proposals, approved text-file applies,
      and workspace-scoped shell commands. Successful write proposals create
      pending approval records unless a standing approval policy applies. The
      local apply and bounded shell adapters are not sandboxed and do not yet
      have full idempotency, interrupted-apply recovery, or risky-command
      approval coverage. Safe diagnostics such as ping may run through the
      bounded shell policy, but agents still cannot use git writes, access the
      browser, fetch from network services, install packages, or retrieve
      secrets.
    remediation: Add idempotency keys, recovery tests, and sandboxed apply before
      expanding mutable tools; add command approval policy before risky shell commands.
