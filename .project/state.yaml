known_issues:
  - id: I-001
    title: Legacy duplicate projects in .rorven/state.json
    description: >
      Many test runs created duplicate "Rorven Local" projects under the same
      workspace root. The uniqueness guard was added (raises ValueError on
      duplicate workspace_root), but the existing data has duplicates.
    remediation: Manual cleanup of .rorven/state.json or a migration pass.
  - id: I-002
    title: explicit subagent dispatch is not implemented
    description: >
      Project messages now queue and execute the root orchestrator task through
      the model gateway, but the orchestrator cannot yet dispatch real child
      agents. The previous hardcoded reviewer/implementer path was removed.
    remediation: Add a durable orchestrator dispatch contract, policy checks,
      child task creation, and worker join handling.
  - id: I-003
    title: local file persistence remains the temporary system of record
    description: >
      The API and worker persist projects, runs, tasks, artifacts, settings, and
      root messages to state.json. The product target remains Postgres.
    remediation: Implement the Postgres repository slice with startup migration
      tests before claiming production persistence.
  - id: I-004
    title: no brokered tools or sandbox authority
    description: >
      Model-backed workers can produce text artifacts only. They cannot inspect,
      edit, execute, or commit project files through controlled tools yet.
    remediation: Implement tool broker, permission policy, sandbox adapter, and
      audit trail before allowing code-changing claims.
