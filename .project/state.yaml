known_issues:
  - id: I-001
    title: Legacy duplicate projects in .rorven/state.json
    description: >
      Many test runs created duplicate "Rorven Local" projects under the same
      workspace root. The uniqueness guard was added (raises ValueError on
      duplicate workspace_root), but the existing data has duplicates.
    remediation: Manual cleanup of .rorven/state.json or a migration pass.
  - id: I-002
    title: project chat submit persists run but does not execute agent
    description: >
      Submitting a message to a project creates a Run and parent AgentRun record
      (orchestrator, status=queued) but no real agent work is performed.
      The walking skeleton has no worker executing tasks yet.
    remediation: Implement worker task execution loop (M1 outcome).
  - id: I-003
    title: plan_child_runs intentionally returns empty list
    description: >
      Child agent run creation was previously mocked with hardcoded reviewer and
      implementer runs. The mock was removed. Real child run dispatch requires
      the worker execution loop from I-002.
    remediation: Implement real child dispatch in worker loop.
