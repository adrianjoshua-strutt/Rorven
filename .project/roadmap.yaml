milestones:
  - id: M1
    name: Durable walking skeleton
    status: active
    outcomes:
      - accepted first-slice ADR set
      - stable first-slice ports and module boundaries
      - project creation and workspace binding
      - durable parent and child run records
      - worker leasing and recovery
      - reloadable run tree UI
      - automatic startup migration skeleton

  - id: M2
    name: Provider-backed agent runtime
    status: planned
    outcomes:
      - LangGraph runtime adapter
      - OpenRouter model-provider adapter
      - model-profile resolution and usage recording
      - runtime adapter contract tests
      - model-provider contract tests

  - id: M3
    name: Security and controlled execution
    status: planned
    outcomes:
      - permission engine
      - secret-store integration
      - brokered tools
      - approvals
      - sandbox isolation
      - audit trail

  - id: M4
    name: Project memory and model routing
    status: planned
    outcomes:
      - replaceable project memory
      - global and project model-profile overrides
      - usage and cost accounting
      - prompt and definition versioning

  - id: M5
    name: Product-grade UI and operations
    status: planned
    outcomes:
      - project navigation
      - agent-run tree
      - artifacts and diffs
      - memory editor
      - statistics
      - backup and restore
