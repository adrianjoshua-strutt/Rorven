risks:
  - id: R-001
    title: Runtime leakage into domain model
    severity: high
    mitigation: architecture import tests and runtime adapter contract
  - id: R-002
    title: Raw secrets reach model context or logs
    severity: critical
    mitigation: brokered tools, central redaction, no secret values in application database
  - id: R-003
    title: Duplicate side effects after worker recovery
    severity: critical
    mitigation: idempotency keys, transactional task creation, deduplication records
  - id: R-004
    title: Over-abstraction before first working slice
    severity: medium
    mitigation: define only ports required by the current real execution slice
  - id: R-005
    title: Agent prompt and workflow drift
    severity: high
    mitigation: immutable versioned definitions and run-time resolution records
  - id: R-006
    title: Memory becomes untrusted hidden state
    severity: high
    mitigation: typed memory, provenance, invalidation, UI visibility, normative-doc precedence
  - id: R-007
    title: OpenRouter-specific behavior leaks upward
    severity: medium
    mitigation: provider-neutral model gateway and adapter contract tests
  - id: R-008
    title: Legacy compatibility branches accumulate in runtime code
    severity: high
    mitigation: migrate persisted data and configuration to the canonical model before use; require an ADR, owner, telemetry, and removal date for every exception
  - id: R-009
    title: Automatic migration fails or leaves partially transformed data
    severity: critical
    mitigation: transactional and resumable migrations, preflight checks, backups for destructive changes, startup blocking on failure, and recovery tests
  - id: R-010
    title: Provisional product name later requires replacement
    severity: low
    mitigation: centralize identity metadata and keep branding out of domain, persistence, event, and API contracts
  - id: R-011
    title: First slice becomes either overbuilt or throwaway
    severity: high
    mitigation: implement durable project execution with real ports, persisted state, recovery tests, and no product mock adapters
  - id: R-012
    title: Console UI drifts away from the product mental model
    severity: high
    mitigation: keep root, project, subagent, and settings surfaces explicit; use Mantine component primitives for controls and reserve custom CSS for layout only
  - id: R-013
    title: Product surfaces accumulate oversized files
    severity: medium
    mitigation: keep UI screens split into components, hooks, and typed helpers; keep API entrypoints thin with schemas, serializers, and routes in separate modules
  - id: R-014
    title: Model-backed subagents are mistaken for tool-capable agents
    severity: high
    mitigation: keep prompts explicit that this slice has read-only tools and proposal-only diffs; implement approvals, sandbox policy, and mutable tool audit before allowing code-changing claims
  - id: R-015
    title: No worker task execution loop means projects silently queue without progressing
    severity: high
    mitigation: implement the task execution loop (M1) before any user-facing project workflow claims are made; ChatView shows queued status explicitly
